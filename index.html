<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINGADELIC | Coming Soon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f3ff;
            --secondary: #ff0055;
            --neon-purple: #bd00ff;
            --bg-dark: #050505;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at center, #1a0024 0%, #000000 70%);
            overflow: hidden;
            text-align: center;
        }
        .container {
            position: relative;
            z-index: 2;
            padding: 20px;
            max-width: 600px;
        }
        .logo {
            max-width: 80%;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(189, 0, 255, 0.6));
            margin-bottom: 20px;
        }
        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px var(--primary);
        }
        p {
            font-family: 'Roboto', sans-serif;
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--secondary);
            color: var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 0 15px var(--secondary);
        }
        .social-btn:hover {
            background: var(--secondary);
            color: white;
            box-shadow: 0 0 30px var(--secondary);
            transform: translateY(-5px);
        }
        /* Glitch effect on text */
        .glitch {
            position: relative;
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://raw.githubusercontent.com/fingadelic/fingadelic-site/main/images/fingadelic-text.png" alt="Fingadelic" class="logo">
        
        <h1 class="glitch">New Site Loading...</h1>
        <p>The future of funk is being rebuilt. <br> Join us soon for the ultimate production academy.</p>

        <div class="social-links">
            <a href="https://instagram.com/fingadelic" target="_blank" class="social-btn"><i class="fab fa-instagram"></i></a>
            <a href="https://youtube.com/@FingazzHouse" target="_blank" class="social-btn"><i class="fab fa-youtube"></i></a>
            <a href="https://open.spotify.com/artist/5r1yBS6lhh7Mo4Egr3k0JT?si=wJ0hWWDRSVOCmHViLRT-sA" target="_blank" class="social-btn"><i class="fab fa-spotify"></i></a>
        </div>
    </div>

</body>
</html>
